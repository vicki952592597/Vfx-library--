<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>*{margin:0;padding:0}body{background:#04030a;overflow:hidden}canvas{display:block}</style></head><body>
<canvas id="c"></canvas>
<script>
var c=document.getElementById("c"),x=c.getContext("2d"),W,H,t=0;
function rs(){W=c.width=innerWidth;H=c.height=innerHeight}
addEventListener("resize",rs);rs();
var stars=[];for(var i=0;i<300;i++){stars.push({
x:Math.random()*2-1,y:Math.random()*2-1,z:Math.random(),
s:Math.random()*1.5+0.5,tw:Math.random()*6.28,ts:Math.random()*2+1})}
function draw(){
x.fillStyle="rgba(4,3,10,0.12)";x.fillRect(0,0,W,H);t+=0.005;
x.globalCompositeOperation="lighter";
for(var j=0;j<4;j++){
var nx=W*(0.3+j*0.15)+Math.sin(t*0.3+j)*80;
var ny=H*(0.4+j*0.08)+Math.cos(t*0.2+j)*60;
var gr=x.createRadialGradient(nx,ny,0,nx,ny,W*0.25);
var h=[260,220,280,200][j];
gr.addColorStop(0,"hsla("+h+",60%,40%,0.04)");
gr.addColorStop(0.5,"hsla("+h+",50%,25%,0.02)");
gr.addColorStop(1,"transparent");
x.fillStyle=gr;x.fillRect(0,0,W,H)}
for(var i=0;i<stars.length;i++){var s=stars[i];
var sx=W*0.5+s.x*W*0.5;var sy=H*0.5+s.y*H*0.5;
var twinkle=(Math.sin(t*s.ts+s.tw)+1)*0.5;
var a=twinkle*0.7*s.z+0.1;var r=s.s*s.z;
x.beginPath();x.arc(sx,sy,r,0,6.28);
x.fillStyle="rgba(200,210,255,"+a+")";x.fill();
if(twinkle>0.8){var cr=r*4;
var cg=x.createRadialGradient(sx,sy,0,sx,sy,cr);
cg.addColorStop(0,"rgba(180,200,255,"+a*0.3+")");
cg.addColorStop(1,"transparent");
x.fillStyle=cg;x.beginPath();x.arc(sx,sy,cr,0,6.28);x.fill()}}
x.globalCompositeOperation="source-over";
requestAnimationFrame(draw)}draw();
</script></body></html>
