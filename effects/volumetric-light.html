<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>*{margin:0;padding:0}body{background:#08060e;overflow:hidden}canvas{display:block}</style></head><body>
<canvas id="c"></canvas>
<script>
var c=document.getElementById("c"),x=c.getContext("2d"),W,H,t=0;
function rs(){W=c.width=innerWidth;H=c.height=innerHeight}
addEventListener("resize",rs);rs();
var rays=[
{x:0.2,w:60,h:0.9,hue:40,a:0.12,s:0.8},
{x:0.35,w:40,h:0.85,hue:45,a:0.08,s:1.1},
{x:0.5,w:80,h:0.95,hue:35,a:0.15,s:0.6},
{x:0.65,w:35,h:0.8,hue:50,a:0.07,s:1.3},
{x:0.8,w:55,h:0.88,hue:42,a:0.10,s:0.9}];
var dust=[];for(var i=0;i<100;i++){dust.push({
x:Math.random()*W,y:Math.random()*H,
vx:(Math.random()-0.5)*0.3,vy:-Math.random()*0.4-0.1,
s:Math.random()*2+0.5,a:Math.random()*0.4+0.1})}
function draw(){
x.fillStyle="rgba(8,6,14,0.1)";x.fillRect(0,0,W,H);t+=0.006;
x.globalCompositeOperation="lighter";
for(var i=0;i<rays.length;i++){var r=rays[i];
var rx=r.x*W+Math.sin(t*r.s+i)*30;
var topW=r.w*(0.8+Math.sin(t*r.s*0.5)*0.2);
var botW=topW*3;
x.beginPath();x.moveTo(rx-topW/2,0);
x.lineTo(rx+topW/2,0);
x.lineTo(rx+botW/2,H*r.h);
x.lineTo(rx-botW/2,H*r.h);x.closePath();
var gr=x.createLinearGradient(rx,0,rx,H*r.h);
gr.addColorStop(0,"hsla("+r.hue+",80%,70%,"+r.a+")");
gr.addColorStop(0.5,"hsla("+r.hue+",70%,50%,"+r.a*0.5+")");
gr.addColorStop(1,"transparent");
x.fillStyle=gr;x.fill()}
for(var j=0;j<dust.length;j++){var d=dust[j];
d.x+=d.vx;d.y+=d.vy;
if(d.y<-5){d.y=H+5;d.x=Math.random()*W}
if(d.x<0)d.x=W;if(d.x>W)d.x=0;
x.fillStyle="rgba(255,220,150,"+d.a*0.5+")";
x.beginPath();x.arc(d.x,d.y,d.s,0,6.28);x.fill()}
x.globalCompositeOperation="source-over";
requestAnimationFrame(draw)}draw();
</script></body></html>
