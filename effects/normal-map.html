<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>动态法线贴图</title><style>*{margin:0;padding:0}body{background:#0e0e14;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh}
canvas{border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.5)}</style></head><body>
<canvas id="c" width="400" height="400"></canvas><script>
var c=document.getElementById("c"),x=c.getContext("2d"),S=400,t=0;
var mx=0.5,my=0.3;
addEventListener("mousemove",function(e){var r=c.getBoundingClientRect();mx=(e.clientX-r.left)/S;my=(e.clientY-r.top)/S});
function noise(px,py,seed){return(Math.sin(px*12.9898+py*78.233+seed)*43758.5453)%1}
function fbm(px,py,tm){var v=0,amp=0.5,freq=1;for(var i=0;i<5;i++){v+=amp*Math.sin(px*freq*0.03+tm+i*1.3)*Math.cos(py*freq*0.03+tm*0.7+i*2.1);amp*=0.5;freq*=2}return v}
function draw(){
t+=0.02;var id=x.createImageData(S,S);var d=id.data;
var lx=(mx-0.5)*2,ly=(my-0.5)*2,lz=0.7;
var ll=Math.sqrt(lx*lx+ly*ly+lz*lz);lx/=ll;ly/=ll;lz/=ll;
for(var py=0;py<S;py++){for(var px=0;px<S;px++){
var idx=(py*S+px)*4;
var nx=fbm(px,py,t)*0.5;
var ny=fbm(px+100,py+100,t*0.8)*0.5;
var nz=Math.sqrt(Math.max(0,1-nx*nx-ny*ny));
var diff=Math.max(0,nx*lx+ny*ly+nz*lz);
diff=diff*0.7+0.3;
var spec=Math.pow(Math.max(0,nz*lz+nx*lx*0.5+ny*ly*0.5),16)*0.4;
var r=(nx*0.5+0.5)*255*diff+spec*200;
var g=(ny*0.5+0.5)*255*diff+spec*180;
var b=nz*255*diff+spec*255;
d[idx]=Math.min(255,r);d[idx+1]=Math.min(255,g);d[idx+2]=Math.min(255,b);d[idx+3]=255}}
x.putImageData(id,0,0);
x.globalCompositeOperation="lighter";
var gx=mx*S,gy=my*S;
var sg=x.createRadialGradient(gx,gy,0,gx,gy,120);
sg.addColorStop(0,"rgba(255,250,240,0.08)");sg.addColorStop(1,"transparent");
x.fillStyle=sg;x.fillRect(0,0,S,S);
x.globalCompositeOperation="source-over";
x.strokeStyle="rgba(255,255,255,0.06)";x.lineWidth=1;x.strokeRect(0,0,S,S);
requestAnimationFrame(draw)}draw();
</script></body></html>
