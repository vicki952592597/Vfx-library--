<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>水晶折射材质</title><style>*{margin:0;padding:0}body{background:#060610;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh}
canvas{border-radius:50%;box-shadow:0 0 60px rgba(100,150,255,0.15),0 20px 60px rgba(0,0,0,0.5)}</style></head><body>
<canvas id="c" width="400" height="400"></canvas><script>
var c=document.getElementById("c"),x=c.getContext("2d"),S=400,t=0;
var mx=0.5,my=0.3;
addEventListener("mousemove",function(e){var r=c.getBoundingClientRect();mx=(e.clientX-r.left)/S;my=(e.clientY-r.top)/S});
function draw(){
t+=0.008;x.fillStyle="#060610";x.fillRect(0,0,S,S);
var cx=S/2,cy=S/2,R=170;
x.globalCompositeOperation="lighter";
for(var facet=0;facet<8;facet++){
var a=facet*0.785+t*0.2;
var fx1=cx+Math.cos(a)*R*0.3;
var fy1=cy+Math.sin(a)*R*0.3;
var fx2=cx+Math.cos(a)*R;
var fy2=cy+Math.sin(a)*R;
var fx3=cx+Math.cos(a+0.785)*R;
var fy3=cy+Math.sin(a+0.785)*R;
x.beginPath();x.moveTo(fx1,fy1);x.lineTo(fx2,fy2);x.lineTo(fx3,fy3);x.closePath();
var hue=(facet*45+t*20)%360;
var sa=0.08+Math.sin(t*2+facet)*0.03;
x.fillStyle="hsla("+hue+",60%,50%,"+sa+")";x.fill();
x.strokeStyle="hsla("+hue+",80%,70%,0.12)";x.lineWidth=0.5;x.stroke()}
for(var ring=0;ring<6;ring++){
var rr=30+ring*28;
x.beginPath();x.arc(cx,cy,rr,0,6.28);
x.strokeStyle="rgba(150,200,255,"+(0.06-ring*0.008)+")";x.lineWidth=0.5;x.stroke()}
for(var ray=0;ray<12;ray++){
var ra=ray*0.524+t*0.15;
var inner=30+Math.sin(t+ray)*10;
var outer=R+Math.sin(t*1.3+ray)*10;
x.beginPath();x.moveTo(cx+Math.cos(ra)*inner,cy+Math.sin(ra)*inner);
x.lineTo(cx+Math.cos(ra)*outer,cy+Math.sin(ra)*outer);
x.strokeStyle="rgba(180,220,255,0.04)";x.lineWidth=1;x.stroke()}
var lx=mx*S,ly=my*S;
var lg=x.createRadialGradient(lx,ly,0,lx,ly,180);
lg.addColorStop(0,"rgba(200,230,255,0.1)");lg.addColorStop(0.3,"rgba(150,180,255,0.05)");
lg.addColorStop(1,"transparent");
x.fillStyle=lg;x.beginPath();x.arc(cx,cy,R,0,6.28);x.fill();
var spec1x=cx+(lx-cx)*0.3,spec1y=cy+(ly-cy)*0.3;
var sg=x.createRadialGradient(spec1x,spec1y,0,spec1x,spec1y,40);
sg.addColorStop(0,"rgba(255,255,255,0.2)");sg.addColorStop(0.5,"rgba(200,220,255,0.05)");
sg.addColorStop(1,"transparent");
x.fillStyle=sg;x.beginPath();x.arc(spec1x,spec1y,40,0,6.28);x.fill();
for(var pr=0;pr<5;pr++){
var pa=t*0.3+pr*1.257;var pd=60+Math.sin(t*2+pr)*20;
var ppx=cx+Math.cos(pa)*pd,ppy=cy+Math.sin(pa)*pd;
var hue2=(pr*72+t*30)%360;
var pg=x.createRadialGradient(ppx,ppy,0,ppx,ppy,25);
pg.addColorStop(0,"hsla("+hue2+",90%,70%,0.12)");pg.addColorStop(1,"transparent");
x.fillStyle=pg;x.beginPath();x.arc(ppx,ppy,25,0,6.28);x.fill()}
x.globalCompositeOperation="source-over";
x.beginPath();x.arc(cx,cy,R,0,6.28);
x.strokeStyle="rgba(150,200,255,0.15)";x.lineWidth=1.5;x.stroke();
requestAnimationFrame(draw)}draw();
</script></body></html>
