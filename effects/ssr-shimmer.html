<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SSR 卡面碎光</title><style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#08060e;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:system-ui,sans-serif}
.card{position:relative;width:280px;height:400px;border-radius:18px;overflow:hidden;transform-style:preserve-3d;transition:transform 0.1s ease-out;cursor:pointer}
.card-bg{position:absolute;inset:0;background:linear-gradient(160deg,#0c0a1a 0%,#1a1040 40%,#0f0826 100%);z-index:1}
.card-border{position:absolute;inset:0;border-radius:18px;border:1.5px solid rgba(255,200,100,0.2);z-index:5;pointer-events:none}
.card canvas{position:absolute;inset:0;z-index:3}
.card-label{position:absolute;bottom:20px;left:0;right:0;text-align:center;z-index:6;pointer-events:none;font-size:18px;font-weight:800;letter-spacing:4px;color:rgba(255,220,160,0.85);text-shadow:0 0 20px rgba(255,180,80,0.4)}
.card-rank{position:absolute;top:16px;right:18px;z-index:6;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:linear-gradient(135deg,rgba(255,200,80,0.25),rgba(255,100,50,0.15));color:#ffd080;border:1px solid rgba(255,200,100,0.2);letter-spacing:2px}
</style></head><body>
<div class="card" id="card">
<div class="card-bg"></div>
<canvas id="c"></canvas>
<div class="card-border"></div>
<span class="card-rank">SSR</span>
<div class="card-label">✦ SHIMMER ✦</div>
</div><script>
var card=document.getElementById("card"),c=document.getElementById("c"),x=c.getContext("2d"),W=280,H=400,t=0;
c.width=W;c.height=H;
var mx=0.5,my=0.5;
card.addEventListener("mousemove",function(e){var r=card.getBoundingClientRect();mx=(e.clientX-r.left)/r.width;my=(e.clientY-r.top)/r.height;
card.style.transform="perspective(800px) rotateY("+(mx-0.5)*20+"deg) rotateX("+((0.5-my)*15)+"deg)"});
card.addEventListener("mouseleave",function(){mx=0.5;my=0.5;card.style.transform="perspective(800px) rotateY(0) rotateX(0)"});
var sparkles=[];for(var i=0;i<60;i++)sparkles.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5,tw:Math.random()*6.28,ts:Math.random()*3+1,hue:30+Math.random()*30});
function draw(){
x.clearRect(0,0,W,H);t+=0.02;
var gx=mx*W,gy=my*H;
x.globalCompositeOperation="lighter";
var rg=x.createRadialGradient(gx,gy,0,gx,gy,200);
rg.addColorStop(0,"rgba(255,200,100,0.12)");rg.addColorStop(0.4,"rgba(255,150,80,0.05)");rg.addColorStop(1,"transparent");
x.fillStyle=rg;x.fillRect(0,0,W,H);
for(var i=0;i<5;i++){var a1=t*0.5+i*1.25;var lx=W*0.5+Math.cos(a1)*120;var ly=H*0.5+Math.sin(a1)*160;
var lg=x.createRadialGradient(lx,ly,0,lx,ly,80);
lg.addColorStop(0,"rgba(255,180,80,0.06)");lg.addColorStop(1,"transparent");
x.fillStyle=lg;x.fillRect(lx-80,ly-80,160,160)}
for(var j=0;j<sparkles.length;j++){var s=sparkles[j];
var twinkle=(Math.sin(t*s.ts+s.tw)+1)*0.5;
if(twinkle<0.3)continue;
var dx=s.x-gx,dy=s.y-gy;var dist=Math.sqrt(dx*dx+dy*dy);
var bright=dist<120?(1-dist/120)*0.6:0;
var a=(twinkle*0.5+bright)*0.8;
x.save();x.translate(s.x,s.y);
x.fillStyle="hsla("+s.hue+",80%,75%,"+a+")";
x.fillRect(-s.s*2,-0.5,s.s*4,1);x.fillRect(-0.5,-s.s*2,1,s.s*4);
x.restore();
if(bright>0.2){var sg=x.createRadialGradient(s.x,s.y,0,s.x,s.y,s.s*6);
sg.addColorStop(0,"hsla("+s.hue+",70%,60%,"+a*0.3+")");sg.addColorStop(1,"transparent");
x.fillStyle=sg;x.beginPath();x.arc(s.x,s.y,s.s*6,0,6.28);x.fill()}}
var rainbow=x.createLinearGradient(gx-100,gy-100,gx+100,gy+100);
rainbow.addColorStop(0,"rgba(255,100,100,0.03)");rainbow.addColorStop(0.33,"rgba(100,255,100,0.03)");
rainbow.addColorStop(0.66,"rgba(100,100,255,0.03)");rainbow.addColorStop(1,"rgba(255,100,255,0.03)");
x.fillStyle=rainbow;x.fillRect(0,0,W,H);
x.globalCompositeOperation="source-over";
requestAnimationFrame(draw)}draw();
</script></body></html>
