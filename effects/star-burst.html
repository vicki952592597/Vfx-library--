<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>卡牌升星爆发</title><style>*{margin:0;padding:0}body{background:#0a0810;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh}
canvas{display:block}</style></head><body>
<canvas id="c"></canvas><script>
var c=document.getElementById("c"),x=c.getContext("2d"),W,H,t=0,phase=0,timer=0;
function rs(){W=c.width=innerWidth;H=c.height=innerHeight}
addEventListener("resize",rs);rs();
var sparks=[],rings=[];
function boom(){sparks=[];rings=[];
for(var i=0;i<80;i++){var a=Math.random()*6.28;var sp=Math.random()*6+2;
sparks.push({x:W/2,y:H/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:Math.random()*0.015+0.008,
hue:40+Math.random()*20,s:Math.random()*3+1})}
for(var j=0;j<4;j++)rings.push({r:0,maxR:100+j*70,life:1,decay:0.012-j*0.002,w:3-j*0.5})}
boom();
function drawStar(cx,cy,r,pts,rot){
x.beginPath();for(var i=0;i<pts*2;i++){var a=rot+i*Math.PI/pts;
var rr=i%2===0?r:r*0.4;x.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr)}x.closePath()}
function draw(){
x.fillStyle="rgba(10,8,16,0.12)";x.fillRect(0,0,W,H);t+=0.02;timer+=0.02;
if(timer>5){timer=0;boom()}
x.globalCompositeOperation="lighter";
for(var i=rings.length-1;i>=0;i--){var r=rings[i];
r.r+=(r.maxR-r.r)*0.08;r.life-=r.decay;
if(r.life<=0)continue;
x.beginPath();x.arc(W/2,H/2,r.r,0,6.28);
x.strokeStyle="rgba(255,200,80,"+r.life*0.4+")";x.lineWidth=r.w*r.life;x.stroke();
var rg=x.createRadialGradient(W/2,H/2,r.r-10,W/2,H/2,r.r+10);
rg.addColorStop(0,"rgba(255,180,60,"+r.life*0.05+")");rg.addColorStop(1,"transparent");
x.fillStyle=rg;x.beginPath();x.arc(W/2,H/2,r.r+10,0,6.28);x.fill()}
for(var j=sparks.length-1;j>=0;j--){var s=sparks[j];
s.x+=s.vx;s.y+=s.vy;s.vy+=0.05;s.vx*=0.99;s.life-=s.decay;
if(s.life<=0)continue;
var g=x.createRadialGradient(s.x,s.y,0,s.x,s.y,s.s*3);
g.addColorStop(0,"hsla("+s.hue+",100%,80%,"+s.life*0.8+")");
g.addColorStop(1,"transparent");
x.fillStyle=g;x.beginPath();x.arc(s.x,s.y,s.s*3,0,6.28);x.fill()}
var coreA=Math.max(0,timer<1?1-timer:0);
if(coreA>0){var cg=x.createRadialGradient(W/2,H/2,0,W/2,H/2,60);
cg.addColorStop(0,"rgba(255,255,220,"+coreA*0.6+")");
cg.addColorStop(0.3,"rgba(255,200,80,"+coreA*0.3+")");
cg.addColorStop(1,"transparent");
x.fillStyle=cg;x.beginPath();x.arc(W/2,H/2,60,0,6.28);x.fill()}
var starA=Math.sin(timer*0.8)*0.3+0.4;
x.fillStyle="rgba(255,220,100,"+starA+")";
drawStar(W/2,H/2,20+Math.sin(t)*3,5,-Math.PI/2+t*0.1);x.fill();
x.fillStyle="rgba(255,240,200,"+starA*0.5+")";
drawStar(W/2,H/2,28+Math.sin(t*1.3)*4,5,-Math.PI/2+t*0.1);x.fill();
x.globalCompositeOperation="source-over";
requestAnimationFrame(draw)}draw();
</script></body></html>
