<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>流体蓝色球体 — R3F + GLSL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #020510;
    }
    .info {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(255,255,255,0.55);
      font-family: 'Segoe UI', 'PingFang SC', system-ui, sans-serif;
      font-size: 12px;
      pointer-events: none;
      user-select: none;
      text-align: center;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div class="info">移动鼠标与球体互动 &nbsp;·&nbsp; Fluid Sphere Shader</div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
      "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.12?deps=react@18.2.0,react-dom@18.2.0",
      "@react-three/drei": "https://esm.sh/@react-three/drei@9.93.0?deps=react@18.2.0,react-dom@18.2.0,three@0.160.0,@react-three/fiber@8.15.12",
      "three": "https://esm.sh/three@0.160.0"
    }
  }
  </script>

  <script type="module">
    import React, { useRef, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { jsx, jsxs } from 'react/jsx-runtime';
    import { Canvas, useFrame, useThree } from '@react-three/fiber';
    import * as THREE from 'three';

    // ================================================================
    //  顶点着色器 — 3D Simplex 噪声流体变形
    // ================================================================
    const vertexShader = /* glsl */ `
      uniform float uTime;
      uniform float uNoiseScale;
      uniform float uDisplacementStrength;
      uniform vec2  uMouse;

      varying vec3 vNormal;
      varying vec3 vPosition;
      varying vec3 vWorldPosition;
      varying float vDisplacement;
      varying vec2 vUv;

      //
      // 3D Simplex Noise — Stefan Gustavson (Ashima Arts)
      //
      vec4 permute(vec4 x){ return mod(((x*34.0)+1.0)*x, 289.0); }
      vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314 * r; }

      float snoise(vec3 v){
        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);

        vec3 i  = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);

        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);

        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;

        i = mod(i, 289.0);
        vec4 p = permute(permute(permute(
                  i.z + vec4(0.0, i1.z, i2.z, 1.0))
                + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                + i.x + vec4(0.0, i1.x, i2.x, 1.0));

        float n_ = 1.0/7.0;
        vec3 ns = n_ * D.wyz - D.xzx;

        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);

        vec4 x = x_ * ns.x + ns.yyyy;
        vec4 y = y_ * ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);

        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);

        vec4 s0 = floor(b0)*2.0 + 1.0;
        vec4 s1 = floor(b1)*2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));

        vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;

        vec3 p0 = vec3(a0.xy, h.x);
        vec3 p1 = vec3(a0.zw, h.y);
        vec3 p2 = vec3(a1.xy, h.z);
        vec3 p3 = vec3(a1.zw, h.w);

        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;

        vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
        m = m * m;
        return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
      }

      // FBM (Fractal Brownian Motion)
      float fbm(vec3 p) {
        float value = 0.0;
        float amplitude = 0.5;
        float frequency = 1.0;
        for (int i = 0; i < 5; i++) {
          value += amplitude * snoise(p * frequency);
          amplitude *= 0.5;
          frequency *= 2.1;
        }
        return value;
      }

      void main() {
        vUv = uv;
        vec3 pos = position;
        vec3 norm = normal;

        // 流体噪声位移 — 多层 FBM
        float t = uTime * 0.35;
        vec3 noiseCoord = pos * uNoiseScale + vec3(t, t * 0.7, t * 0.5);

        float noise1 = fbm(noiseCoord);
        float noise2 = fbm(noiseCoord + vec3(5.2, 1.3, 2.8));
        float noise3 = fbm(noiseCoord + vec3(noise1 * 1.5, noise2 * 1.5, t * 0.3));

        float displacement = noise3 * uDisplacementStrength;

        // 鼠标交互 — 在球面上产生局部变形
        vec3 mouseDir = normalize(vec3(uMouse.x, uMouse.y, 0.5));
        float mouseInfluence = pow(max(dot(norm, mouseDir), 0.0), 4.0) * 0.15;
        displacement += mouseInfluence;

        // 应用位移
        pos += norm * displacement;

        vDisplacement = displacement;
        vPosition = pos;
        vWorldPosition = (modelMatrix * vec4(pos, 1.0)).xyz;

        // 用有限差分重新计算法线
        float eps = 0.001;
        vec3 tangent1 = normalize(cross(norm, vec3(0.0, 1.0, 0.0)));
        if (length(tangent1) < 0.01) tangent1 = normalize(cross(norm, vec3(1.0, 0.0, 0.0)));
        vec3 tangent2 = normalize(cross(norm, tangent1));

        vec3 posT1 = position + tangent1 * eps;
        vec3 posT2 = position + tangent2 * eps;

        float dT1 = fbm((posT1 * uNoiseScale) + vec3(t, t*0.7, t*0.5)
                    + vec3(5.2, 1.3, 2.8));
        float nT1 = fbm((posT1 * uNoiseScale) + vec3(t, t*0.7, t*0.5)
                    + vec3(dT1*1.5, fbm((posT1*uNoiseScale)+vec3(t,t*0.7,t*0.5))*1.5, t*0.3));

        float dT2 = fbm((posT2 * uNoiseScale) + vec3(t, t*0.7, t*0.5)
                    + vec3(5.2, 1.3, 2.8));
        float nT2 = fbm((posT2 * uNoiseScale) + vec3(t, t*0.7, t*0.5)
                    + vec3(dT2*1.5, fbm((posT2*uNoiseScale)+vec3(t,t*0.7,t*0.5))*1.5, t*0.3));

        vec3 displaced1 = posT1 + normalize(posT1) * nT1 * uDisplacementStrength;
        vec3 displaced2 = posT2 + normalize(posT2) * nT2 * uDisplacementStrength;

        vec3 newNormal = normalize(cross(displaced1 - pos, displaced2 - pos));
        // 确保法线朝外
        if (dot(newNormal, norm) < 0.0) newNormal = -newNormal;

        vNormal = normalize(normalMatrix * newNormal);

        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `;

    // ================================================================
    //  片段着色器 — 多层蓝色渐变 + SSS + 菲涅尔 + 高光
    // ================================================================
    const fragmentShader = /* glsl */ `
      uniform float uTime;
      uniform vec3  uColor1;    // 深蓝
      uniform vec3  uColor2;    // 中蓝
      uniform vec3  uColor3;    // 亮蓝/青
      uniform vec3  uLightPos1;
      uniform vec3  uLightPos2;

      varying vec3  vNormal;
      varying vec3  vPosition;
      varying vec3  vWorldPosition;
      varying float vDisplacement;
      varying vec2  vUv;

      void main() {
        vec3 normal = normalize(vNormal);
        vec3 viewDir = normalize(cameraPosition - vWorldPosition);

        // ---- 基础颜色：基于位移量的渐变 ----
        float d = smoothstep(-0.12, 0.18, vDisplacement);
        vec3 baseColor = mix(uColor1, uColor2, d);
        baseColor = mix(baseColor, uColor3, smoothstep(0.12, 0.22, vDisplacement));

        // ---- 菲涅尔效果（边缘发光） ----
        float fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 3.5);
        vec3 fresnelColor = vec3(0.3, 0.55, 1.0);
        baseColor += fresnel * fresnelColor * 0.65;

        // ---- 双光源照明 ----
        // 光源 1（主光）
        vec3 lightDir1 = normalize(uLightPos1 - vWorldPosition);
        float diff1 = max(dot(normal, lightDir1), 0.0);
        vec3 halfDir1 = normalize(lightDir1 + viewDir);
        float spec1 = pow(max(dot(normal, halfDir1), 0.0), 64.0);

        // 光源 2（补光/背光）
        vec3 lightDir2 = normalize(uLightPos2 - vWorldPosition);
        float diff2 = max(dot(normal, lightDir2), 0.0);
        vec3 halfDir2 = normalize(lightDir2 + viewDir);
        float spec2 = pow(max(dot(normal, halfDir2), 0.0), 48.0);

        // ---- 次表面散射模拟 (SSS) ----
        float sss1 = pow(max(dot(viewDir, -lightDir1), 0.0), 3.0) * 0.25;
        float sss2 = pow(max(dot(viewDir, -lightDir2), 0.0), 3.0) * 0.15;
        vec3 sssColor = vec3(0.1, 0.35, 0.8);

        // ---- 环境光遮蔽近似 ----
        float ao = 0.6 + 0.4 * smoothstep(-0.15, 0.15, vDisplacement);

        // ---- 组合光照 ----
        vec3 ambient = baseColor * 0.15;
        vec3 diffuse = baseColor * (diff1 * 0.7 + diff2 * 0.35);
        vec3 specular = vec3(0.7, 0.85, 1.0) * (spec1 * 0.9 + spec2 * 0.4);
        vec3 subsurface = sssColor * (sss1 + sss2);

        vec3 finalColor = (ambient + diffuse + specular + subsurface) * ao;

        // ---- 内部发光 ----
        float innerGlow = pow(1.0 - abs(dot(normal, viewDir)), 2.0);
        finalColor += vec3(0.05, 0.15, 0.4) * innerGlow * 0.5;

        // ---- 流体高光纹路 ----
        float highlight = smoothstep(0.14, 0.2, vDisplacement) * smoothstep(0.25, 0.18, vDisplacement);
        finalColor += vec3(0.4, 0.7, 1.0) * highlight * 0.3;

        // ---- 色调映射 & Gamma ----
        finalColor = finalColor / (finalColor + vec3(1.0)); // Reinhard tone mapping
        finalColor = pow(finalColor, vec3(1.0 / 2.2));      // Gamma correction

        gl_FragColor = vec4(finalColor, 1.0);
      }
    `;

    // ================================================================
    //  FluidSphere 组件
    // ================================================================
    function FluidSphere() {
      const meshRef = useRef();
      const mouseRef = useRef(new THREE.Vector2(0, 0));

      const uniforms = useMemo(() => ({
        uTime:                 { value: 0 },
        uNoiseScale:           { value: 1.5 },
        uDisplacementStrength: { value: 0.18 },
        uMouse:                { value: new THREE.Vector2(0, 0) },
        uColor1:               { value: new THREE.Color('#030d1f') },  // 深蓝
        uColor2:               { value: new THREE.Color('#0a4a8a') },  // 中蓝
        uColor3:               { value: new THREE.Color('#48b1e8') },  // 亮蓝
        uLightPos1:            { value: new THREE.Vector3(4, 4, 5) },
        uLightPos2:            { value: new THREE.Vector3(-3, -2, 4) },
      }), []);

      useFrame(({ clock, pointer }) => {
        if (!meshRef.current) return;
        const mat = meshRef.current.material;
        mat.uniforms.uTime.value = clock.getElapsedTime();

        // 平滑跟随鼠标
        mouseRef.current.lerp(pointer, 0.03);
        mat.uniforms.uMouse.value.copy(mouseRef.current);

        // 球体缓慢自转
        meshRef.current.rotation.y += 0.002;
        meshRef.current.rotation.x = Math.sin(clock.getElapsedTime() * 0.15) * 0.1;
      });

      return jsx('mesh', {
        ref: meshRef,
        children: jsxs(React.Fragment, {
          children: [
            jsx('icosahedronGeometry', { args: [1.5, 128] }),
            jsx('shaderMaterial', {
              vertexShader,
              fragmentShader,
              uniforms,
            }),
          ]
        }),
      });
    }

    // ================================================================
    //  环境粒子
    // ================================================================
    function Particles() {
      const ref = useRef();
      const count = 800;

      const positions = useMemo(() => {
        const arr = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
          // 在球体外围随机分布
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);
          const r = 2.5 + Math.random() * 8;
          arr[i*3]   = r * Math.sin(phi) * Math.cos(theta);
          arr[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
          arr[i*3+2] = r * Math.cos(phi);
        }
        return arr;
      }, []);

      useFrame(({ clock }) => {
        if (ref.current) {
          ref.current.rotation.y = clock.getElapsedTime() * 0.02;
          ref.current.rotation.z = clock.getElapsedTime() * 0.01;
        }
      });

      return jsx('points', {
        ref,
        children: jsxs(React.Fragment, {
          children: [
            jsx('bufferGeometry', {
              children: jsx('bufferAttribute', {
                attach: 'attributes-position',
                count,
                array: positions,
                itemSize: 3,
              }),
            }),
            jsx('pointsMaterial', {
              size: 0.015,
              color: '#4a90d9',
              transparent: true,
              opacity: 0.4,
              sizeAttenuation: true,
              blending: THREE.AdditiveBlending,
              depthWrite: false,
            }),
          ]
        }),
      });
    }

    // ================================================================
    //  光晕环（装饰）
    // ================================================================
    function GlowRing() {
      const ref = useRef();

      const ringUniforms = useMemo(() => ({
        uTime: { value: 0 },
      }), []);

      const ringVertex = /* glsl */ `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;

      const ringFragment = /* glsl */ `
        uniform float uTime;
        varying vec2 vUv;
        void main() {
          float alpha = smoothstep(0.0, 0.03, vUv.y) * smoothstep(1.0, 0.97, vUv.y);
          float pulse = 0.3 + 0.2 * sin(uTime * 1.5 + vUv.x * 12.0);
          vec3 col = vec3(0.15, 0.45, 0.9) * pulse;
          gl_FragColor = vec4(col, alpha * 0.25);
        }
      `;

      useFrame(({ clock }) => {
        if (ref.current) {
          ref.current.material.uniforms.uTime.value = clock.getElapsedTime();
          ref.current.rotation.z = clock.getElapsedTime() * 0.1;
        }
      });

      return jsx('mesh', {
        ref,
        rotation: [Math.PI / 2, 0, 0],
        children: jsxs(React.Fragment, {
          children: [
            jsx('torusGeometry', { args: [2.2, 0.008, 16, 128] }),
            jsx('shaderMaterial', {
              vertexShader: ringVertex,
              fragmentShader: ringFragment,
              uniforms: ringUniforms,
              transparent: true,
              side: THREE.DoubleSide,
              blending: THREE.AdditiveBlending,
              depthWrite: false,
            }),
          ]
        }),
      });
    }

    // ================================================================
    //  场景
    // ================================================================
    function Scene() {
      return jsxs(React.Fragment, {
        children: [
          jsx(FluidSphere, {}),
          jsx(Particles, {}),
          jsx(GlowRing, {}),
        ]
      });
    }

    // ================================================================
    //  App
    // ================================================================
    function App() {
      return jsx(Canvas, {
        camera: { position: [0, 0, 4.5], fov: 50 },
        dpr: [1, 2],
        gl: {
          antialias: true,
          alpha: false,
          powerPreference: 'high-performance',
          toneMapping: THREE.NoToneMapping,
        },
        style: { width: '100%', height: '100%' },
        children: jsx(Scene, {}),
      });
    }

    // ================================================================
    //  挂载
    // ================================================================
    createRoot(document.getElementById('root')).render(jsx(App, {}));
  </script>
</body>
</html>
