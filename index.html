<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动效资产展示平台 — FX Asset Viewer</title>
<style>
/* ================================================================
   全局重置 & CSS 变量
   ================================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-base:      #0a0c10;
  --bg-surface:   rgba(14,17,24,0.82);
  --bg-glass:     rgba(18,22,32,0.55);
  --bg-hover:     rgba(255,255,255,0.04);
  --bg-active:    rgba(100,140,255,0.10);
  --border:       rgba(255,255,255,0.06);
  --border-glow:  rgba(100,160,255,0.18);
  --text:         rgba(255,255,255,0.88);
  --text-dim:     rgba(255,255,255,0.40);
  --text-muted:   rgba(255,255,255,0.22);
  --accent:       #5b8cff;
  --accent-glow:  rgba(91,140,255,0.35);
  --gold:         #f0c040;
  --gold-dim:     rgba(240,192,64,0.25);
  --radius:       12px;
  --radius-sm:    8px;
  --glass-blur:   20px;
  --transition:   0.3s cubic-bezier(0.4,0,0.2,1);
  --font:         'Segoe UI','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
  --font-mono:    'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace;
}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  font-family:var(--font);
  background:var(--bg-base);
  color:var(--text);
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(40,70,140,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 80% 30%, rgba(60,40,120,0.06) 0%, transparent 70%);
  pointer-events:none;z-index:0;
}

/* ================================================================
   三栏布局
   ================================================================ */
.app{
  display:grid;
  grid-template-columns: 260px 1fr 420px;
  grid-template-rows: 56px 1fr;
  grid-template-areas:
    "header header header"
    "sidebar preview code";
  height:100vh;
  position:relative;z-index:1;
}

/* ===== 顶栏 ===== */
.header{
  grid-area:header;
  display:flex;align-items:center;
  padding:0 24px;gap:14px;
  backdrop-filter:blur(var(--glass-blur));
  -webkit-backdrop-filter:blur(var(--glass-blur));
  background:var(--bg-glass);
  border-bottom:1px solid var(--border);
  z-index:10;
}
.header .logo{
  display:flex;align-items:center;gap:10px;
  font-size:15px;font-weight:700;letter-spacing:0.5px;
  color:var(--text);user-select:none;
}
.header .logo .icon{
  width:28px;height:28px;
  background:linear-gradient(135deg,var(--accent),#a06cff);
  border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  box-shadow:0 0 12px var(--accent-glow);
}
.header .tag{
  font-size:10px;padding:2px 8px;border-radius:20px;
  background:var(--gold-dim);color:var(--gold);
  font-weight:600;letter-spacing:0.5px;
}
.header .spacer{flex:1}
.header .status{
  font-size:11px;color:var(--text-dim);
  display:flex;align-items:center;gap:6px;
}
.header .status .dot{
  width:6px;height:6px;border-radius:50%;
  background:#4ade80;
  box-shadow:0 0 6px rgba(74,222,128,0.5);
  animation:pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.5;transform:scale(0.8)}
}

/* ===== 左侧边栏 ===== */
.sidebar{
  grid-area:sidebar;
  display:flex;flex-direction:column;
  backdrop-filter:blur(var(--glass-blur));
  -webkit-backdrop-filter:blur(var(--glass-blur));
  background:var(--bg-glass);
  border-right:1px solid var(--border);
  overflow:hidden;
}
.sidebar-title{
  padding:20px 20px 12px;
  font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:1.5px;
  color:var(--text-dim);user-select:none;
}
.sidebar-list{
  flex:1;overflow-y:auto;padding:0 10px 20px;
}
.sidebar-list::-webkit-scrollbar{width:3px}
.sidebar-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}

.fx-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;margin-bottom:2px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  transition:all var(--transition);
  border:1px solid transparent;
  user-select:none;
  position:relative;overflow:hidden;
}
.fx-item::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(100,160,255,0.04),transparent);
  opacity:0;transition:opacity var(--transition);
}
.fx-item:hover{
  background:var(--bg-hover);border-color:var(--border);
}
.fx-item:hover::before{opacity:1}
.fx-item.active{
  background:var(--bg-active);
  border-color:var(--border-glow);
  box-shadow:0 0 20px rgba(91,140,255,0.06);
}
.fx-item .fx-icon{
  width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  transition:all var(--transition);
}
.fx-item.active .fx-icon{
  background:var(--accent-glow);
  border-color:var(--accent);
  box-shadow:0 0 14px var(--accent-glow);
}
.fx-item .fx-info{display:flex;flex-direction:column;gap:2px;min-width:0}
.fx-item .fx-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fx-item .fx-file{font-size:10px;color:var(--text-dim);font-family:var(--font-mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== 中间预览区 ===== */
.preview{
  grid-area:preview;
  display:flex;flex-direction:column;
  position:relative;background:#08090d;
}
.preview-toolbar{
  display:flex;align-items:center;
  padding:12px 20px;gap:12px;
  background:var(--bg-glass);
  backdrop-filter:blur(var(--glass-blur));
  -webkit-backdrop-filter:blur(var(--glass-blur));
  border-bottom:1px solid var(--border);z-index:2;
}
.preview-toolbar .title{
  font-size:12px;font-weight:600;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:1px;
}
.preview-toolbar .file-badge{
  font-size:11px;padding:3px 10px;border-radius:20px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  color:var(--text-dim);font-family:var(--font-mono);
}
.preview-toolbar .spacer{flex:1}
.preview-toolbar .btn-reload{
  width:30px;height:30px;border-radius:8px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all var(--transition);
}
.preview-toolbar .btn-reload:hover{
  background:var(--bg-hover);border-color:var(--border-glow);color:var(--text);
}
.preview-frame-wrap{
  flex:1;position:relative;overflow:hidden;
}
.preview-frame-wrap iframe{
  width:100%;height:100%;border:none;background:#000;
}
.empty-state{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;pointer-events:none;z-index:1;
}
.empty-state.hidden{display:none}
.empty-state .empty-icon{font-size:48px;opacity:0.15}
.empty-state .empty-text{
  font-size:14px;color:var(--text-muted);
  text-align:center;line-height:1.8;
}

/* ===== 右侧代码面板 ===== */
.code-panel{
  grid-area:code;
  display:flex;flex-direction:column;
  backdrop-filter:blur(var(--glass-blur));
  -webkit-backdrop-filter:blur(var(--glass-blur));
  background:var(--bg-glass);
  border-left:1px solid var(--border);
  overflow:hidden;
}
.code-header{
  display:flex;align-items:center;
  padding:12px 16px;gap:10px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.code-header .title{
  font-size:12px;font-weight:600;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:1px;
}
.code-header .spacer{flex:1}

/* 一键复制按钮 */
.btn-copy{
  display:flex;align-items:center;gap:7px;
  padding:7px 16px;border-radius:8px;
  border:1px solid var(--gold-dim);
  background:linear-gradient(135deg,rgba(240,192,64,0.12),rgba(240,192,64,0.04));
  color:var(--gold);font-size:12px;font-weight:700;
  letter-spacing:0.5px;cursor:pointer;
  transition:all var(--transition);
  position:relative;overflow:hidden;
  font-family:var(--font);
}
.btn-copy::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(240,192,64,0.08),transparent);
  transform:translateX(-100%);
  transition:transform 0.5s ease;
}
.btn-copy:hover{
  border-color:var(--gold);
  box-shadow:0 0 20px rgba(240,192,64,0.15),inset 0 0 20px rgba(240,192,64,0.05);
  transform:translateY(-1px);
}
.btn-copy:hover::before{transform:translateX(100%)}
.btn-copy:active{transform:translateY(0) scale(0.97)}
.btn-copy.copied{
  border-color:#4ade80;color:#4ade80;
  background:linear-gradient(135deg,rgba(74,222,128,0.12),rgba(74,222,128,0.04));
}

.code-body{
  flex:1;overflow:auto;padding:0;position:relative;
}
.code-body::-webkit-scrollbar{width:5px;height:5px}
.code-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
.code-body::-webkit-scrollbar-corner{background:transparent}

.code-body pre{
  margin:0;padding:20px;
  font-family:var(--font-mono);
  font-size:11.5px;line-height:1.75;
  color:var(--text-dim);
  white-space:pre;tab-size:2;min-height:100%;
}
/* 语法高亮 */
.hl-tag{color:#5b8cff}
.hl-attr{color:#c792ea}
.hl-string{color:#c3e88d}
.hl-comment{color:rgba(255,255,255,0.18);font-style:italic}
.hl-keyword{color:#f78c6c}
.hl-number{color:#f0c040}
.hl-punct{color:rgba(255,255,255,0.28)}
.hl-css-prop{color:#80cbc4}

.code-empty{
  display:flex;align-items:center;justify-content:center;
  height:100%;font-size:13px;color:var(--text-muted);
}

/* 加载动画 */
.loader-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(8,9,13,0.85);z-index:5;
  opacity:0;pointer-events:none;transition:opacity 0.3s ease;
}
.loader-overlay.show{opacity:1;pointer-events:auto}
.loader{
  width:32px;height:32px;
  border:2px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%) translateY(20px);
  padding:10px 24px;border-radius:10px;
  background:rgba(20,24,36,0.92);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border-glow);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  font-size:13px;font-weight:600;color:var(--accent);
  opacity:0;pointer-events:none;
  transition:all 0.4s cubic-bezier(0.4,0,0.2,1);z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 响应式 */
@media(max-width:1100px){
  .app{grid-template-columns:220px 1fr 320px}
}
@media(max-width:860px){
  .app{
    grid-template-columns:1fr;
    grid-template-rows:56px auto 1fr auto;
    grid-template-areas:"header" "sidebar" "preview" "code";
  }
  .sidebar{max-height:180px}
  .code-panel{max-height:280px}
}
</style>
</head>
<body>

<div class="app">

  <!-- 顶栏 -->
  <header class="header">
    <div class="logo">
      <div class="icon">✦</div>
      FX Asset Viewer
    </div>
    <span class="tag">INTERNAL</span>
    <div class="spacer"></div>
    <div class="status">
      <span class="dot"></span>
      动效代码化管线 · 实时预览
    </div>
  </header>

  <!-- 左侧资产目录 -->
  <aside class="sidebar">
    <div class="sidebar-title">资产目录 · Assets</div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <!-- 中间预览区 -->
  <main class="preview">
    <div class="preview-toolbar">
      <span class="title">实时预览</span>
      <span class="file-badge" id="fileBadge">—</span>
      <div class="spacer"></div>
      <button class="btn-reload" id="btnReload" title="刷新预览">↻</button>
    </div>
    <div class="preview-frame-wrap">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">◇</div>
        <div class="empty-text">在左侧选择一个特效资产<br>即可实时预览</div>
      </div>
      <div class="loader-overlay" id="loader"><div class="loader"></div></div>
      <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </main>

  <!-- 右侧代码面板 -->
  <aside class="code-panel">
    <div class="code-header">
      <span class="title">源代码 · Source</span>
      <div class="spacer"></div>
      <button class="btn-copy" id="btnCopy">
        <span id="copyIcon">⧉</span>
        <span id="copyText">一键复制全部代码</span>
      </button>
    </div>
    <div class="code-body" id="codeBody">
      <div class="code-empty" id="codeEmpty">选择特效后自动加载源代码</div>
      <pre id="codeContent" style="display:none"></pre>
    </div>
  </aside>

</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================================
   资产数据（写死菜单 — 可自由扩展）
   ================================================================ */
var FX_ASSETS = [
  { name: 'SSR 卡牌余烬',       file: 'ssr-card-bg.html',          icon: '🔥' },
  { name: '流体蓝色球体',       file: 'fluid-sphere.html',         icon: '🔵' },
  { name: 'SSR 粒子特效',       file: 'ssr-particle.html',         icon: '✨' },
  { name: 'SSR 粒子特效 v2',    file: 'ssr_particle_effect.html',  icon: '💫' },
  { name: 'SSR 光剑特效',       file: 'ssr_saber_effect.html',     icon: '⚔️' },
  { name: 'SSR 光剑 FX',        file: 'ssr_saber_fx.html',         icon: '🗡️' },
  { name: '特效 1',             file: 'effect1.html',              icon: '◆'  },
  { name: '特效 2',             file: 'effect2.html',              icon: '◇'  },
];

/* ================================================================
   DOM 引用
   ================================================================ */
var sidebarList  = document.getElementById('sidebarList');
var previewFrame = document.getElementById('previewFrame');
var fileBadge    = document.getElementById('fileBadge');
var emptyState   = document.getElementById('emptyState');
var loader       = document.getElementById('loader');
var btnReload    = document.getElementById('btnReload');
var btnCopy      = document.getElementById('btnCopy');
var copyIcon     = document.getElementById('copyIcon');
var copyText     = document.getElementById('copyText');
var codeContent  = document.getElementById('codeContent');
var codeEmpty    = document.getElementById('codeEmpty');
var toastEl      = document.getElementById('toast');

var currentFile = '';
var rawSourceCode = '';

/* ================================================================
   构建侧边栏
   ================================================================ */
FX_ASSETS.forEach(function(asset) {
  var el = document.createElement('div');
  el.className = 'fx-item';
  el.setAttribute('data-file', asset.file);
  el.innerHTML =
    '<div class="fx-icon">' + asset.icon + '</div>' +
    '<div class="fx-info">' +
      '<div class="fx-name">' + asset.name + '</div>' +
      '<div class="fx-file">' + asset.file + '</div>' +
    '</div>';
  el.addEventListener('click', function() { selectAsset(asset.file, el); });
  sidebarList.appendChild(el);
});

/* ================================================================
   选中资产
   ================================================================ */
function selectAsset(file, itemEl) {
  var items = document.querySelectorAll('.fx-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  itemEl.classList.add('active');

  currentFile = file;
  fileBadge.textContent = file;
  emptyState.classList.add('hidden');
  loader.classList.add('show');

  previewFrame.onload = function() { loader.classList.remove('show'); };
  previewFrame.onerror = function() { loader.classList.remove('show'); };
  previewFrame.src = file;

  fetchSource(file);
}

/* ================================================================
   读取源码 + 高亮
   ================================================================ */
function fetchSource(file) {
  codeContent.style.display = 'none';
  codeEmpty.style.display = 'flex';
  codeEmpty.textContent = '正在加载源代码…';
  rawSourceCode = '';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', file, true);
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 400) {
      rawSourceCode = xhr.responseText;
      codeEmpty.style.display = 'none';
      codeContent.style.display = 'block';
      codeContent.innerHTML = highlightCode(escapeHTML(rawSourceCode));
    } else {
      codeEmpty.textContent = '⚠ 无法读取 (' + xhr.status + ')';
    }
  };
  xhr.onerror = function() {
    codeEmpty.textContent = '⚠ 网络错误，无法读取源代码';
  };
  xhr.send();
}

function escapeHTML(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function highlightCode(code) {
  return code
    /* HTML 注释 */
    .replace(/(&lt;!--[\s\S]*?--&gt;)/g,  '<span class="hl-comment">$1</span>')
    /* JS 行注释 */
    .replace(/(\/\/[^\n]*)/g,              '<span class="hl-comment">$1</span>')
    /* JS 块注释 */
    .replace(/(\/\*[\s\S]*?\*\/)/g,        '<span class="hl-comment">$1</span>')
    /* HTML 标签 */
    .replace(/(&lt;\/?)([\w-]+)/g,         '<span class="hl-punct">$1</span><span class="hl-tag">$2</span>')
    .replace(/(\/?&gt;)/g,                 '<span class="hl-punct">$1</span>')
    /* 属性 */
    .replace(/\b([\w-]+)(=)(&quot;)/g,     '<span class="hl-attr">$1</span><span class="hl-punct">$2</span><span class="hl-punct">$3</span>')
    /* 字符串 */
    .replace(/(&quot;)(.*?)(&quot;)/g,     '<span class="hl-string">$1$2$3</span>')
    .replace(/(')(.*?)(')/g,               '<span class="hl-string">$1$2$3</span>')
    /* JS 关键字 */
    .replace(/\b(const|let|var|function|return|if|else|for|while|new|this|class|import|export|from|of|in|true|false|null|undefined|async|await|try|catch|throw|void|typeof|instanceof)\b/g,
                                           '<span class="hl-keyword">$1</span>')
    /* 数字 */
    .replace(/\b(\d+\.?\d*)\b/g,           '<span class="hl-number">$1</span>')
    /* CSS 属性 */
    .replace(/^(\s*)([\w-]+)(\s*:\s*)/gm,  '$1<span class="hl-css-prop">$2</span><span class="hl-punct">$3</span>');
}

/* ================================================================
   一键复制
   ================================================================ */
btnCopy.addEventListener('click', function() {
  if (!rawSourceCode) {
    showToast('⚠ 请先选择一个特效资产');
    return;
  }
  copyToClipboard(rawSourceCode);
});

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onCopySuccess, fallbackCopy);
  } else {
    fallbackCopy();
  }

  function fallbackCopy() {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); onCopySuccess(); }
    catch(e) { showToast('⚠ 复制失败'); }
    document.body.removeChild(ta);
  }

  function onCopySuccess() {
    btnCopy.classList.add('copied');
    copyIcon.textContent = '✓';
    copyText.textContent = '已复制！';
    showToast('✓ 全部代码已复制到剪贴板');
    setTimeout(function() {
      btnCopy.classList.remove('copied');
      copyIcon.textContent = '⧉';
      copyText.textContent = '一键复制全部代码';
    }, 2200);
  }
}

/* ================================================================
   刷新预览
   ================================================================ */
btnReload.addEventListener('click', function() {
  if (currentFile) {
    loader.classList.add('show');
    previewFrame.src = currentFile;
    showToast('↻ 已刷新预览');
  }
});

/* ================================================================
   Toast
   ================================================================ */
var toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2200);
}

/* ================================================================
   键盘快捷键
   ================================================================ */
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
    e.preventDefault();
    btnCopy.click();
  }
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    var items = Array.prototype.slice.call(document.querySelectorAll('.fx-item'));
    var activeIdx = -1;
    for (var i = 0; i < items.length; i++) {
      if (items[i].classList.contains('active')) { activeIdx = i; break; }
    }
    var nextIdx;
    if (e.key === 'ArrowDown') {
      nextIdx = activeIdx < items.length - 1 ? activeIdx + 1 : 0;
    } else {
      nextIdx = activeIdx > 0 ? activeIdx - 1 : items.length - 1;
    }
    items[nextIdx].click();
    items[nextIdx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
});
</script>
</body>
</html>
