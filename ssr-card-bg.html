<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSR 卡牌底层特效</title>
<style>
  *{margin:0;padding:0}
  html,body{
    width:100%;height:100%;
    overflow:hidden;
    /* 深邃暗夜蓝渐变背景 — 用 CSS 渲染，零开销 */
    background:linear-gradient(
      180deg,
      #03060f 0%,
      #060e1f 25%,
      #081428 50%,
      #0a1a35 75%,
      #0c1225 100%
    );
  }
  canvas{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    /* 让 canvas 不拦截任何交互 */
    pointer-events:none;
  }
</style>
</head>
<body>
<canvas id="fx"></canvas>

<script>
/* ================================================================
 *  SSR 卡牌底层环境特效  —  极致轻量 Canvas 2D
 *  ● 金色余烬粒子（Golden Embers）
 *  ● 中央呼吸光晕（Radial Glow）
 *  ● 目标 60 fps，零 WebGL 开销
 * ================================================================ */
(() => {
  'use strict';

  const canvas = document.getElementById('fx');
  const ctx    = canvas.getContext('2d');

  /* ---------- 尺寸自适应 ---------- */
  let W, H, cx, cy, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);   // 限制最大 2x，节省填充
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);            // 统一以逻辑像素绘制
    cx = W * 0.5;
    cy = H * 0.5;
  }
  window.addEventListener('resize', resize);
  resize();

  /* ==========================================================
   *  粒子池 — 预分配，零 GC
   * ========================================================== */
  const PARTICLE_COUNT = 120;          // 120 颗足够细腻，且远低于性能瓶颈
  const pool = new Array(PARTICLE_COUNT);

  /** 重置 / 初始化一颗粒子 */
  function resetParticle(p, firstSpawn) {
    p.x  = Math.random() * W;
    p.y  = firstSpawn ? Math.random() * H : H + 10 + Math.random() * 40;   // 首帧随机 y，后续从底部生成
    p.vy = -(0.15 + Math.random() * 0.45);                                 // 缓慢上升 0.15~0.6 px/frame
    p.r  = 1.0 + Math.random() * 2.2;                                      // 半径 1~3.2 px
    p.life    = 0;
    p.maxLife = 280 + Math.random() * 320;                                  // 生命 280~600 帧 ≈ 4.7~10s
    p.phase   = Math.random() * Math.PI * 2;                                // 正弦扰动相位
    p.ampX    = 0.15 + Math.random() * 0.35;                                // 横向振幅
    p.freqX   = 0.008 + Math.random() * 0.012;                              // 横向频率
    // 颜色：从暖金到琥珀随机偏移
    const hue = 38 + Math.random() * 14;         // 38°~52° 金色范围
    const sat = 85 + Math.random() * 15;
    const lit = 55 + Math.random() * 20;
    p.color = `hsl(${hue},${sat}%,${lit}%)`;
  }

  // 初始化粒子池
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    pool[i] = {};
    resetParticle(pool[i], true);
  }

  /* ==========================================================
   *  呼吸光晕 — 离屏预渲染 (只画一次)
   * ========================================================== */
  const glowSize = 600;                     // 逻辑像素
  const glowCanvas = document.createElement('canvas');
  const glowCtx    = glowCanvas.getContext('2d');

  function buildGlow() {
    const s = glowSize * dpr;
    glowCanvas.width  = s;
    glowCanvas.height = s;
    const half = s * 0.5;
    const grad = glowCtx.createRadialGradient(half, half, 0, half, half, half);
    // 极其微弱的金色 — 最大 alpha 仅 0.07
    grad.addColorStop(0,   'rgba(255, 210, 100, 0.07)');
    grad.addColorStop(0.3, 'rgba(255, 195,  80, 0.04)');
    grad.addColorStop(0.6, 'rgba(255, 180,  60, 0.015)');
    grad.addColorStop(1,   'rgba(255, 170,  50, 0)');
    glowCtx.fillStyle = grad;
    glowCtx.fillRect(0, 0, s, s);
  }
  buildGlow();
  // resize 时重建光晕
  window.addEventListener('resize', buildGlow);

  /* ==========================================================
   *  主循环
   * ========================================================== */
  let frame = 0;

  function tick() {
    frame++;
    ctx.clearRect(0, 0, W, H);

    /* ---- 呼吸光晕 ---- */
    // 周期 ~4s (240帧@60fps)，scale 在 0.85 ~ 1.15 之间
    const breathT = frame * (Math.PI * 2 / 240);
    const scale   = 1.0 + Math.sin(breathT) * 0.15;
    const drawSize = glowSize * scale;
    const gx = cx - drawSize * 0.5;
    const gy = cy - drawSize * 0.5;
    // globalAlpha 也做微弱呼吸
    ctx.globalAlpha = 0.85 + Math.sin(breathT) * 0.15;
    ctx.drawImage(glowCanvas, gx, gy, drawSize, drawSize);
    ctx.globalAlpha = 1;

    /* ---- 金色余烬粒子 ---- */
    ctx.globalCompositeOperation = 'lighter';      // 加法混合 → 粒子自然发光

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = pool[i];
      p.life++;

      // 超出生命或飞出屏幕 → 回收
      if (p.life > p.maxLife || p.y < -20) {
        resetParticle(p, false);
        continue;
      }

      // 运动
      p.y += p.vy;
      p.x += Math.sin(p.phase + p.life * p.freqX) * p.ampX;

      // 透明度：淡入 → 稳定 → 淡出
      const progress = p.life / p.maxLife;
      let alpha;
      if (progress < 0.1)      alpha = progress / 0.1;           // 前 10% 淡入
      else if (progress < 0.7) alpha = 1;                        // 中间稳定
      else                     alpha = (1 - progress) / 0.3;     // 后 30% 淡出
      alpha *= (0.4 + p.r / 3.2 * 0.6);                          // 大粒子稍亮

      // 绘制 — 单次 arc + fill，极低开销
      ctx.globalAlpha = alpha;
      ctx.fillStyle   = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();

      // 对较大粒子额外画一圈极淡的辉光
      if (p.r > 2.0) {
        ctx.globalAlpha = alpha * 0.18;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 3.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
